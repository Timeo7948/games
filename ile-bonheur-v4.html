<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏝️ Île Bonheur v4</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--coral:#FF6B6B;--yellow:#FFD93D;--mint:#6BCB77;--sky:#4ECDC4;--purple:#A29BFE;--orange:#FFA552;--pink:#FF8FB1;--blue:#74B9FF;--shadow:0 4px 20px rgba(0,0,0,.18);--shadow-lg:0 8px 40px rgba(0,0,0,.32)}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#1a1a2e}

/* ══ SETUP ══ */
#setup{position:fixed;inset:0;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .7s}
#setup.hidden{opacity:0;pointer-events:none}
.ss-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.sstar{position:absolute;background:white;border-radius:50%;animation:twinkle ease-in-out infinite}
.ss-island{font-size:clamp(4rem,10vw,7rem);animation:floatSlow 3s ease-in-out infinite;margin-bottom:.8rem;filter:drop-shadow(0 0 30px rgba(255,217,61,.5))}
.ss-title{font-family:'Fredoka One';font-size:clamp(2.2rem,6vw,4.5rem);color:#FFD93D;text-shadow:0 0 50px rgba(255,217,61,.7);margin-bottom:.2rem;letter-spacing:2px}
.ss-sub{color:#A29BFE;font-size:.85rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:1.8rem}
.ss-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.13);border-radius:24px;padding:1.8rem;max-width:440px;width:92%;backdrop-filter:blur(20px)}
.ss-label{color:rgba(255,255,255,.6);font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:.4rem}
.ss-input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.18);color:white;padding:.65rem .9rem;border-radius:13px;font-family:'Nunito';font-size:1rem;font-weight:700;outline:none;margin-bottom:1.1rem;transition:border-color .2s}
.ss-input:focus{border-color:#FFD93D}
.ss-input::placeholder{color:rgba(255,255,255,.28)}
.mode-row{display:flex;gap:.45rem;margin-bottom:1.3rem}
.mode-btn{flex:1;padding:.55rem;border-radius:13px;border:2px solid rgba(255,255,255,.13);background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);cursor:pointer;font-family:'Nunito';font-weight:700;font-size:.75rem;transition:all .2s;text-align:center;line-height:1.5}
.mode-btn.sel{border-color:#FFD93D;background:rgba(255,217,61,.14);color:#FFD93D}
.ss-btns{display:flex;gap:.5rem}
.ss-btn{flex:1;border:none;color:white;padding:.8rem;border-radius:13px;font-family:'Fredoka One';font-size:1.1rem;cursor:pointer;transition:all .2s}
.ss-btn.primary{background:linear-gradient(135deg,#FFD93D,#FF6B6B);box-shadow:0 6px 25px rgba(255,107,107,.4)}
.ss-btn.primary:hover{transform:scale(1.03) translateY(-2px)}
.ss-btn.continue-btn{background:linear-gradient(135deg,#6BCB77,#4ECDC4);box-shadow:0 6px 25px rgba(107,203,119,.4)}
.ss-btn.continue-btn:hover{transform:scale(1.03) translateY(-2px)}
.ss-btn:disabled{opacity:.38;cursor:not-allowed;transform:none!important}

/* ══ GAME ══ */
#game{position:fixed;inset:0;display:none;flex-direction:column}
#game.visible{display:flex}

/* ══ TOP BAR ══ */
#topbar{background:rgba(0,0,0,.4);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.1);padding:.48rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;gap:.4rem;flex-wrap:wrap}
.top-logo{font-family:'Fredoka One';color:#FFD93D;font-size:1.2rem;cursor:pointer;text-shadow:0 0 15px rgba(255,217,61,.4);white-space:nowrap}
#clock{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.14);color:white;padding:.28rem .85rem;border-radius:20px;font-weight:700;font-size:.8rem;display:flex;align-items:center;gap:.35rem;white-space:nowrap}
.top-acts{display:flex;gap:.32rem;flex-wrap:wrap;align-items:center}
.tbtn{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);color:white;padding:.26rem .68rem;border-radius:15px;cursor:pointer;font-family:'Nunito';font-weight:700;font-size:.73rem;transition:all .2s;white-space:nowrap}
.tbtn:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}
.tbtn.acc{background:rgba(255,217,61,.16);border-color:rgba(255,217,61,.38);color:#FFD93D}
.mode-ind{padding:.22rem .65rem;border-radius:11px;font-size:.67rem;font-weight:800;background:rgba(255,107,107,.18);color:#FF6B6B;border:1px solid rgba(255,107,107,.28)}
.mode-ind.safe{background:rgba(107,203,119,.18);color:#6BCB77;border-color:rgba(107,203,119,.28)}

/* ══ LAYOUT ══ */
#content{flex:1;display:flex;overflow:hidden;position:relative}

/* ══ ISLAND ══ */
#island{flex:1;position:relative;overflow:hidden;user-select:none}
#sky{position:absolute;inset:0;transition:background 3s ease}
#sky.day{background:linear-gradient(180deg,#1a6fc4 0%,#2196F3 20%,#64B5F6 38%,#B3E5FC 44%,#A5D6A7 44%,#66BB6A 65%,#388E3C 65%,#2E7D32 100%)}
#sky.sunset{background:linear-gradient(180deg,#b71c1c 0%,#E64A19 15%,#FF7043 28%,#FFAB40 40%,#FFD54F 44%,#81C784 44%,#388E3C 65%,#1B5E20 100%)}
#sky.night{background:linear-gradient(180deg,#0a0020 0%,#0d1b4b 30%,#0a2a0a 44%,#1a4a1a 65%,#0a2a0a 100%)}
#sky.dawn{background:linear-gradient(180deg,#1a1a4e 0%,#6a1a6a 20%,#FF7043 38%,#FFD54F 44%,#A5D6A7 44%,#66BB6A 65%,#2E7D32 100%)}
#sky-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}
#nightstars{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 2.5s}
#nightstars.on{opacity:1}
#sunmoon{position:absolute;pointer-events:none;transition:all 3s ease;font-size:2.8rem;filter:drop-shadow(0 0 20px rgba(255,220,50,.9))}
#clouds{position:absolute;top:0;left:0;right:0;height:44%;pointer-events:none;overflow:hidden}
.cloud{position:absolute;animation:cloudDrift linear infinite}
.cb{background:rgba(255,255,255,.88);border-radius:50%;position:absolute}
#aurora{position:absolute;top:0;left:0;right:0;height:40%;pointer-events:none;opacity:0;transition:opacity 3s;overflow:hidden}
#aurora.on{opacity:.35}
.aurora-band{position:absolute;width:200%;height:60px;border-radius:50%;animation:auroraMove ease-in-out infinite;opacity:.7}
#water{position:absolute;bottom:0;left:0;right:0;height:26%;overflow:hidden}
.water-gradient{position:absolute;inset:0;background:linear-gradient(180deg,#0288D1 0%,#01579B 60%,#002171 100%)}
.water-shine{position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,.15),transparent);animation:waterShine 4s ease-in-out infinite}
.wave{position:absolute;width:200%;height:35px;background:rgba(255,255,255,.12);border-radius:50%;animation:waveMove linear infinite;left:-50%}
.wave2{background:rgba(255,255,255,.07);height:25px;animation-duration:9s!important}
.wave3{background:rgba(255,255,255,.05);height:20px;animation-duration:13s!important;top:5px}
#ground{position:absolute;bottom:26%;left:0;right:0;height:5.5%}
.ground-sand{position:absolute;inset:0;background:linear-gradient(180deg,#F9E79F 0%,#E8C84A 60%,#C9A227 100%)}
.ground-texture{position:absolute;inset:0;background-image:radial-gradient(ellipse at 20% 50%,rgba(0,0,0,.06) 1px,transparent 1px),radial-gradient(ellipse at 60% 30%,rgba(0,0,0,.04) 1px,transparent 1px),radial-gradient(ellipse at 80% 70%,rgba(0,0,0,.05) 1px,transparent 1px);background-size:30px 20px,25px 25px,35px 15px}
.ground-glint{position:absolute;top:20%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);animation:glint 6s ease-in-out infinite}
#grass-edge{position:absolute;bottom:31%;left:0;right:0;height:3%;background:linear-gradient(180deg,#66BB6A,#388E3C);border-radius:0 0 40% 40%/0 0 20px 20px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3))}
#deco-layer{position:absolute;bottom:26%;left:0;right:0;height:0;z-index:4;pointer-events:none}
#bld-layer{position:absolute;bottom:31%;left:0;right:0;height:0;z-index:5}
#av-layer{position:absolute;bottom:31%;left:0;right:0;height:0;z-index:20}

/* ══ BUILDINGS ══ */
.bld{position:absolute;bottom:0;cursor:pointer;transition:transform .18s ease,filter .18s;display:flex;flex-direction:column;align-items:center}
.bld:hover{transform:scale(1.07) translateY(-6px);filter:drop-shadow(0 8px 16px rgba(0,0,0,.35))}
.bld-shadow{position:absolute;bottom:-8px;left:10%;right:10%;height:12px;background:rgba(0,0,0,.25);border-radius:50%;filter:blur(4px);z-index:-1}
.bld-body{border-radius:12px 12px 0 0;position:relative;overflow:hidden}
.bld-body::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);pointer-events:none}
.bld-sheen{position:absolute;top:0;bottom:0;left:-40%;width:30%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:bldSheen 5s ease-in-out infinite;pointer-events:none}
.bld-win{position:absolute;background:rgba(255,255,255,.55);border-radius:4px;animation:winGlow 3s ease-in-out infinite;box-shadow:0 0 6px rgba(255,220,100,.5)}
.bld-win.on{background:rgba(255,220,100,.85);box-shadow:0 0 10px rgba(255,200,50,.8)}
.bld-door{position:absolute;bottom:0;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.32);border-radius:7px 7px 0 0}
.bld-icon{font-size:1.25rem;margin-bottom:3px;transition:transform .2s;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3))}
.bld:hover .bld-icon{transform:scale(1.35) rotate(-8deg)}
.bld-name{font-size:.58rem;font-weight:800;color:white;background:rgba(0,0,0,.55);padding:1px 6px;border-radius:7px;white-space:nowrap;margin-top:2px;opacity:0;transition:opacity .2s;backdrop-filter:blur(4px)}
.bld:hover .bld-name{opacity:1}
.bld-occs{position:absolute;top:-16px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.occ-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.bld-open{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:.55rem;font-weight:800;color:white;background:rgba(107,203,119,.85);padding:1px 5px;border-radius:8px;white-space:nowrap;opacity:0;transition:opacity .3s}
.bld:hover .bld-open{opacity:1}

/* ══ AVATARS ══ */
.av{position:absolute;bottom:0;cursor:pointer}
.av-visual{display:flex;flex-direction:column;align-items:center;transition:transform .2s}
.av:hover .av-visual{transform:scale(1.1) translateY(-5px)}
.av-shadow{width:28px;height:6px;background:rgba(0,0,0,.25);border-radius:50%;filter:blur(3px);margin:0 auto;margin-top:-2px}
.av-head{width:36px;height:36px;border-radius:50%;position:relative;border:2.5px solid rgba(255,255,255,.35);box-shadow:0 3px 10px rgba(0,0,0,.25);flex-shrink:0}
.av-head::after{content:'';position:absolute;top:5%;left:15%;right:40%;height:25%;background:rgba(255,255,255,.3);border-radius:50%;pointer-events:none}
.av-hair{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:15px;pointer-events:none;white-space:nowrap}
.av-eyes{position:absolute;top:35%;left:0;right:0;display:flex;justify-content:center;gap:7px}
.av-eye{width:6px;height:7px;background:#1a1a2e;border-radius:50%;position:relative;animation:eyeBlink 4s ease-in-out infinite}
.av-pupil{width:2.5px;height:2.5px;background:white;border-radius:50%;position:absolute;top:1px;left:1.5px}
.av-blush{position:absolute;width:6px;height:4px;background:rgba(255,150,150,.5);border-radius:50%;top:55%}
.av-blush.lft{left:5px}
.av-blush.rgt{right:5px}
.av-mouth{position:absolute;bottom:16%;left:50%;transform:translateX(-50%);font-size:9px;white-space:nowrap}
.av-torso-row{display:flex;align-items:center;gap:0;margin-top:-2px}
.av-arm{width:9px;height:20px;border-radius:5px;position:relative;box-shadow:inset -2px 0 3px rgba(0,0,0,.15)}
.av-arm.L{transform-origin:top center;animation:armSwL .6s ease-in-out infinite alternate}
.av-arm.R{transform-origin:top center;animation:armSwR .6s ease-in-out infinite alternate}
.av-hand{width:8px;height:8px;border-radius:50%;position:absolute;bottom:-4px;left:50%;transform:translateX(-50%)}
.av-shirt{width:30px;height:24px;border-radius:7px 7px 0 0;box-shadow:inset -3px 0 5px rgba(0,0,0,.15)}
.av-legs{display:flex;gap:3px;margin-top:0}
.av-leg{display:flex;flex-direction:column;align-items:center}
.av-legupper{width:11px;height:14px;border-radius:0 0 3px 3px;animation:legSw .55s ease-in-out infinite alternate;box-shadow:inset -2px 0 3px rgba(0,0,0,.12)}
.av-shoe{width:13px;height:6px;border-radius:0 4px 4px 4px;margin-top:-1px;box-shadow:0 2px 4px rgba(0,0,0,.2)}
/* Name tag and mood — OUTSIDE av-visual, never flip */
.av-nametag{font-size:8px;font-weight:800;color:white;background:rgba(0,0,0,.6);padding:1px 5px;border-radius:7px;margin-top:3px;white-space:nowrap;pointer-events:none;backdrop-filter:blur(4px);text-align:center;position:relative;z-index:5}
.av-mood{position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);font-size:13px;pointer-events:none;background:rgba(255,255,255,.95);padding:2px 5px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;white-space:nowrap;z-index:30}
.av-mood.show{display:block;animation:moodPop .4s ease-out}
/* Dialog bubble — always readable, never flips */
.av-dialog{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:white;border-radius:14px;padding:.38rem .7rem;font-size:.68rem;font-weight:700;color:#2D3436;max-width:165px;line-height:1.4;box-shadow:var(--shadow);z-index:40;pointer-events:none;animation:bubbleIn .35s cubic-bezier(.17,.67,.3,1.3);white-space:normal;text-align:center;border:1.5px solid rgba(0,0,0,.07)}
.av-dialog.adult{border-color:#FF6B6B;color:#c0392b;background:#fff5f5}
.av-dialog::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border-left:7px solid transparent;border-right:7px solid transparent;border-top:8px solid white}
.av-fx{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);pointer-events:none;z-index:60;animation:fxFloat 1.9s ease-out forwards;font-size:1.2rem}
.av-walkbob{animation:walkBob .65s ease-in-out infinite}

/* ══ SIDE PANEL ══ */
#panel{width:282px;flex-shrink:0;background:rgba(0,0,0,.32);backdrop-filter:blur(22px);border-left:1px solid rgba(255,255,255,.09);display:flex;flex-direction:column;overflow:hidden}
.ptabs{display:flex;border-bottom:1px solid rgba(255,255,255,.09);flex-shrink:0}
.ptab{flex:1;padding:.45rem .2rem;text-align:center;color:rgba(255,255,255,.38);cursor:pointer;font-weight:800;font-size:.63rem;transition:all .2s;border-bottom:3px solid transparent;letter-spacing:.3px}
.ptab.on{color:#FFD93D;border-color:#FFD93D}
.ptab:hover:not(.on){color:rgba(255,255,255,.65)}
.pbody{flex:1;overflow-y:auto;padding:.62rem}
.pbody::-webkit-scrollbar{width:3px}
.pbody::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
.res-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:.52rem;margin-bottom:.38rem;cursor:pointer;transition:all .2s}
.res-card:hover{background:rgba(255,255,255,.14);transform:translateX(3px)}
.res-card.sel{background:rgba(255,217,61,.11);border-color:rgba(255,217,61,.38)}
.rc-row{display:flex;align-items:center;gap:.42rem}
.rc-face{width:38px;height:38px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.2);position:relative;display:flex;align-items:center;justify-content:center;overflow:visible;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.rc-hair{position:absolute;top:-7px;left:50%;transform:translateX(-50%);font-size:10px}
.rc-mouth{font-size:8px}
.rc-info{flex:1;min-width:0}
.rc-name{color:white;font-weight:800;font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-traits{font-size:.62rem;color:rgba(255,255,255,.42);font-weight:600;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-badges{display:flex;gap:.2rem;flex-wrap:wrap;margin-top:.28rem}
.badge{font-size:.59rem;background:rgba(255,255,255,.1);padding:1px 5px;border-radius:7px;color:rgba(255,255,255,.72);font-weight:700}
.badge.h{background:rgba(107,203,119,.2);color:#6BCB77}
.badge.s{background:rgba(255,107,107,.2);color:#FF6B6B}
.badge.l{background:rgba(255,143,177,.2);color:#FF8FB1}
.badge.inv{background:rgba(162,155,254,.2);color:#A29BFE}
.evt-item{background:rgba(255,255,255,.055);border-radius:9px;padding:.42rem .58rem;margin-bottom:.28rem;border-left:3px solid #FFD93D;animation:slideL .4s ease-out}
.evt-time{font-size:.59rem;color:rgba(255,255,255,.32);font-weight:600}
.evt-txt{font-size:.7rem;color:rgba(255,255,255,.85);font-weight:600;margin-top:1px;line-height:1.42}
.rel-item{display:flex;align-items:center;gap:.42rem;padding:.36rem .48rem;background:rgba(255,255,255,.05);border-radius:9px;margin-bottom:.26rem}
.rel-badge{font-size:.59rem;padding:2px 7px;border-radius:7px;font-weight:700;white-space:nowrap}
.rb-l{background:rgba(255,143,177,.22);color:#FF8FB1}
.rb-f{background:rgba(107,203,119,.22);color:#6BCB77}
.rb-r{background:rgba(255,107,107,.22);color:#FF6B6B}

/* ══ BOTTOM BAR ══ */
#botbar{background:rgba(0,0,0,.42);backdrop-filter:blur(22px);border-top:1px solid rgba(255,255,255,.09);padding:.42rem 1rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:.35rem;flex-wrap:wrap}
.hap-block{display:flex;align-items:center;gap:.4rem;color:white;font-weight:700;font-size:.76rem}
.hap-track{width:80px;height:8px;background:rgba(255,255,255,.14);border-radius:4px;overflow:hidden}
.hap-fill{height:100%;border-radius:4px;transition:width .6s;background:linear-gradient(90deg,#FFD93D,#6BCB77)}
.act-btns{display:flex;gap:.3rem;flex-wrap:wrap}
.abtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:white;padding:.36rem .82rem;border-radius:15px;cursor:pointer;font-family:'Nunito';font-weight:700;font-size:.74rem;transition:all .2s;display:flex;align-items:center;gap:.22rem}
.abtn:hover{background:rgba(255,255,255,.2);transform:translateY(-2px)}
.abtn:active{transform:scale(.96)}
.abtn.y{background:rgba(255,217,61,.11);border-color:rgba(255,217,61,.32);color:#FFD93D}
.abtn.g{background:rgba(107,203,119,.11);border-color:rgba(107,203,119,.32);color:#6BCB77}
.abtn.p{background:rgba(255,143,177,.11);border-color:rgba(255,143,177,.32);color:#FF8FB1}
.abtn.b{background:rgba(116,185,255,.11);border-color:rgba(116,185,255,.32);color:#74B9FF}
.pop-info{color:rgba(255,255,255,.4);font-size:.71rem;font-weight:700;white-space:nowrap}

/* ══ MODAL ══ */
#modal-ov{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.68);backdrop-filter:blur(10px);padding:1rem}
#modal-ov.on{display:flex}
.mbox{background:linear-gradient(160deg,#2a2f35,#1c2228);border-radius:22px;padding:1.35rem;max-width:440px;width:100%;border:1px solid rgba(255,255,255,.1);box-shadow:var(--shadow-lg);max-height:88vh;overflow-y:auto;animation:modalIn .32s cubic-bezier(.17,.67,.3,1.2)}
.mbox::-webkit-scrollbar{width:4px}
.mbox::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px}
.mtitle{font-family:'Fredoka One';color:white;font-size:1.38rem;text-align:center;margin-bottom:1rem}
.mclose{float:right;background:rgba(255,255,255,.1);border:none;color:white;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.92rem;display:flex;align-items:center;justify-content:center;transition:background .2s;line-height:1}
.mclose:hover{background:rgba(255,255,255,.24)}
.msec{margin-bottom:.85rem}
.mlabel{color:rgba(255,255,255,.48);font-size:.68rem;font-weight:800;margin-bottom:.36rem;text-transform:uppercase;letter-spacing:1px}
.mopts{display:flex;gap:.28rem;flex-wrap:wrap}

  Drôle:["Pourquoi les pieuvres portent des chaussettes?","Ha ha! Je sais même pas pourquoi.","J'ai inventé le rire. De rien.","L'ananas sur la pizza c'est de l'art.","*fait une blague. Personne rit. Rit quand même.*","Un poisson rouge a une mémoire de 7 secondes, comme ma to-do list.","Je suis officiellement trop drôle pour cette île.","Pourquoi être sérieux quand on peut être absurde?","Le rire brûle des calories. Je suis sportif en fait.","Mon stand-up préféré: la vie.","Blague du jour: l'existence. Ha.","Les gens disent que je suis trop drôle. Tort. Je suis EXACTEMENT assez drôle.","Pourquoi les cactus ont des piques? Pour faire des blagues acérées.","Mon niveau de sérieux aujourd'hui: négatif.","La réalité est la meilleure comédie.","Mon talent: rire au mauvais moment.","Les mouettes trouvent mes blagues de mer en mer.","J'ai 47 blagues. Toutes nulles. Parfait.","Le sarcasme est mon deuxième prénom.","Je suis comique de nature. La nature est drôle aussi.","La vie est une blague. J'en connais la chute.","Rire c'est la politesse de la désespérance.","J'ai fait rire un crabe aujourd'hui. Nouvelle victoire.","Mon humour est inclusif: tout le monde peut ne pas rire.","Mon CV: 10 ans d'expérience en absurde.","Je transforme les tragédies en comédies. Gratuitement.","Mon humour est comme du vin: dérange les voisins.","Je suis tellement drôle que je me fais rire. C'est gênant.","Pause. Blague arrive. Préparez-vous.","Mon cerveau: 90% blagues, 10% logistique."],
  Ambitieux:["Je serai maire dans 3 ans. Ou demain.","Mon plan est en marche. Muwahahaha.","Le succès m'attend. Il peut patienter.","Chaque seconde perdue est une défaite.","J'ai un tableau Excel de mes ambitions.","Étape 1: île. Étape 2: monde. Étape 3: galaxie.","Les obstacles sont des opportunités déguisées.","Mon agenda est ma religion.","Travailler pendant les vacances? Évidemment.","Je dors 4h. Les gagnants dorment 4h.","Mon réseau est plus grand que cette île.","Objectif: tout.","Networking à la plage. Toujours.","Je réussis donc je suis.","Leadership? Je suis né dedans.","La concurrence? Quelle concurrence?","Mon empire commence par un cocotier.","Vision 2030: domination totale mais sympa.","Je transforme les rêves en OKR.","Mon mantra: plus haut, plus vite, plus rentable.","Je suis ma propre marque.","Mon potentiel est infini. Scientifiquement prouvé.","Je construis mon héritage brique par brique.","La médiocrité est pour les autres.","J'ai 3 projets en parallèle. En vacances.","Mon cerveau ne s'éteint jamais.","Je suis la version beta de moi-même. La v1 arrive bientôt.","Un jour je serai dans les livres d'histoire.","Chaque non est un oui différé.","Dormir c'est de la procrastination."],
  Paresseux:["Zzz… quoi? Non.","Trop d'efforts. Je rentre.","Le canapé me manque déjà.","Peut-être demain. Ou après-demain.","Je ferai ça… un jour.","Bouger c'est bien en théorie.","*dort debout*","La sieste est un art de vivre.","Effort minimal, résultat maximal. Je cherche encore.","Pourquoi faire aujourd'hui ce qu'on peut remettre à jamais?","Mon énergie est en maintenance.","Je suis en mode économie.","La gravité me retient. C'est physique.","Chaque pas compte. Donc j'en fais zéro.","Le repos est mon cardio.","J'ai pensé à me lever. C'était épuisant.","Ma motivation est en déplacement professionnel.","Travail? Intéressant comme concept.","Debout c'est déjà beaucoup.","Je délègue tout. Y compris respirer.","La productivité est surfaite.","Mon sport préféré: la sieste de compétition.","Les gens qui bougent m'épuisent à regarder.","Je suis en train de planifier une sieste pour demain.","Mon rythme naturel: très, très lent.","La flemme est une philosophie.","Marcher jusqu'ici était mon exploit du jour.","Faire le strict nécessaire c'est déjà beaucoup.","Aujourd'hui: rien. Demain: on verra.","Ma to-do list? Elle aussi elle attend."],
  Romantique:["La vie est un poème. Et toi une strophe.","Mon cœur chante la mélodie de l'amour.","*soupir romantique au ralenti*","Les étoiles sont belles. Mais moins que toi.","Chaque coucher de soleil me fait penser à l'amour.","J'ai écrit 47 lettres d'amour ce matin.","L'amour est partout si on sait chercher.","Mon cœur bat en alexandrins.","Regarder la mer et penser à toi. Classique.","L'amour rend l'île encore plus belle.","Mon âme cherche son âme sœur.","Le vent qui souffle dit ton prénom.","Chaque vague est une déclaration.","L'amour c'est ma météo intérieure.","Romantique jusqu'au bout des orteils.","Ma playlist: 100% chansons d'amour.","Les fleurs me font penser à lui/elle.","Un beau regard et mon cœur repart.","L'amour vrai existe. Je le cherche depuis 15 ans.","Mon cœur est grand ouvert. Attention aux courants d'air.","Aimer c'est risquer. J'adore les risques.","Je vois du romantisme dans tout. Même les cocotiers.","L'amour est la meilleure des aventures.","Je crois aux coups de foudre. J'en ai eu 12.","Chaque rencontre est une histoire possible.","L'amour ça ne s'explique pas. Ça se ressent.","La tendresse est ma langue préférée.","J'offre des fleurs pour aucune raison. C'est la meilleure raison.","L'amour sans passion c'est de la géographie.","Tomber amoureux c'est mon sport annuel."],
  Grognon:["C'est quoi ce bruit?!","Tout le monde m'énerve. Surtout moi.","En 1842, c'était mieux.","NON.","Encore cette musique…","Qui a mangé mes biscuits?! ENCORE?!","Je suis souriant. De l'intérieur.","Cette île est trop bruyante.","Pourquoi les gens parlent si fort?","Le soleil tape trop fort. Comme les gens.","Bon.","Je râle donc je suis.","Cette journée était déjà ratée à l'aube.","Les optimistes m'épuisent.","Qui a eu l'idée idiote d'inviter du monde?","Le silence serait apprécié.","Mes humeurs: mauvaise et très mauvaise.","La joie des autres me fatigue.","Les gens heureux cachent forcément quelque chose.","Mon avis: non.","Trop chaud. Trop de monde. Trop de bruit.","La bonne humeur est une forme de naïveté.","Je refuse d'être de bonne humeur avant 14h.","Hmph.","Mon niveau de patience: 0.","Je ne suis pas difficile, je suis précis.","Je veux juste qu'on me fiche la paix.","Sourire? Pour qui? Pour quoi?","La pluie est la seule météo honnête.","Bof."],
  Curieux:["Mais… POURQUOI exactement?","Et si les palmiers avaient des sentiments?","Fascinant! Encore!","J'ai 47 questions. Commençons.","Comment ça marche un flamant rose?","Et si on était dans une simulation… de simulation?","Quelqu'un a disséqué un ananas pour voir?","Qui a décidé que le bleu c'était le bleu?","Les fourmis ont-elles des rêves?","J'ai besoin de savoir COMMENT et POURQUOI.","Chaque chose cache une autre chose.","Les mystères sont des cadeaux non ouverts.","Je lis tout ce qui passe à portée.","Investiguer est mon mode par défaut.","Mais d'où vient vraiment le vent?","Je pose des questions depuis l'âge de 2 ans. Sans pause.","Tout m'intéresse. Même l'ennuyeux.","La connaissance est ma nourriture préférée.","Pourquoi les vagues se ressemblent toutes?","J'ai passé 3h à observer des fourmis. Bilan enrichissant.","Ma curiosité est proportionnelle à l'univers. Donc infinie.","Le pourquoi du pourquoi du pourquoi.","Chaque réponse ouvre 10 nouvelles questions. Parfait.","La réalité est plus étrange que la fiction.","Je collecte les faits insolites. J'en ai 2847.","Apprendre est le meilleur des sports.","Mon cerveau ne s'éteint pas. Jamais.","Une découverte par jour garde l'ennui à l'écart.","Tout est intéressant si on regarde bien.","Avez-vous remarqué que le sable n'est jamais deux fois pareil?"],
  Mystérieux:["Je sais des choses. Des choses.","...","Je suis partout et nulle part.","*disparaît dans le brouillard*","Certaines vérités ne se disent pas à voix haute.","Le secret, c'est qu'il n'y a pas de secret.","Mon passé? Classifié.","Je pourrais vous dire mais alors…","Les ombres me comprennent.","Quelque chose se prépare. Je le sens.","Je ne suis pas là où vous me voyez.","Les apparences sont des mensonges habillés.","Mon vrai nom est… non.","Je connais la fin de cette histoire.","Tout est connecté. Surtout ce qui ne l'est pas.","Les gens comme moi ne s'expliquent pas.","Mon aura parle pour moi.","*regarde au loin significativement*","Je suis la question et la réponse.","Mon silence en dit plus que vos mots.","Le mystère est ma maison.","Mon ombre me devance toujours.","Je vis entre deux réalités.","Les eaux profondes ne font pas de bruit.","Je réponds aux questions avec des questions.","Mon sourire cache une carte au trésor.","La vérité est un oignon. Pleurez.","Qui suis-je? Excellente question. Continuez.","Mes secrets ont des secrets.","Je suis arrivé avant l'aube. Personne ne l'a vu."],
  Optimiste:["Tout va super bien! Probablement!","Le soleil brille. Même la nuit.","Yay! Pour l'éternité!","C'est merveilleux d'être ici!","Même les cactus sont doux avec amour.","Chaque problème est une opportunité déguisée.","La vie est belle et je le répète.","Les mauvais jours préparent les bons.","Rien n'est impossible sauf l'impossible!","Mon verre est plein. Même quand vide.","Aujourd'hui sera fantastique. Je le décide.","La joie est un choix que je fais chaque matin.","Les nuages cachent du soleil. Toujours.","Chaque fin est un début déguisé.","Les gens sont fondamentalement bons.","L'espoir est mon carburant.","Demain sera encore mieux qu'aujourd'hui!","Je transforme les défis en aventures.","Mon super-pouvoir: voir le bon dans tout.","Les sourires sont contagieux. Je sème partout.","La gratitude est ma pratique quotidienne.","Même les erreurs sont des enseignements!","Je vis dans le meilleur des mondes possibles.","L'univers conspire en ma faveur. Toujours.","Les difficultés me rendent plus fort(e)!","La beauté est partout. Regardez mieux.","Mon humeur de base: ensoleillée.","La vie m'a donné des citrons. J'adore les citrons.","Les rêves se réalisent. Les miens en tout cas.","Je choisis la joie. Chaque matin. Même à 6h."],
  Jaloux:["Pourquoi toi et pas moi?!","C'est NUL. (j'adore secrètement)","Hmph. Chanceux.","Pfff. Facile.","Ah oui très bien pour TOI.","Je suis content(e). Vraiment. (non)","C'est pas juste.","Ils ont mieux que moi. Inacceptable.","Pourquoi tout le monde a quelque chose que j'ai pas?","Succès des autres = ma douleur personnelle.","C'est bien pour eux je suppose. *rage intérieure*","Je surveille. Toujours.","Quelqu'un d'autre a eu mon idée avant moi. ENCORE.","Leur succès aurait pu être le mien.","Je compare constamment. C'est exhaustif.","Mon radar jalousie: toujours en alerte.","C'est PAS JUSTE. (version adulte de mes 6 ans)","Ce qu'ils ont, je le mérite plus.","Leur bonheur est une offense personnelle.","Je les regarde vivre. C'est un sport maintenant.","Si seulement c'était moi à leur place.","La jalousie c'est de l'admiration mal habillée. C'est ça.","Pourquoi eux? POURQUOI PAS MOI?","Je veux juste une chose qu'ils n'ont pas. Une seule.","Même le crabe a l'air plus heureux que moi.","*félicite avec les dents serrées*","Je prends des notes. Pour comprendre comment ils font.","Je suis heureux pour eux au fond. Très, très au fond.","Il paraît que la jalousie c'est toxique. Je suis en bonne santé.","Coïncidence qu'ils réussissent tout? Je pense que non."],
  Créatif:["Et si l'île était un tableau?","J'ai dessiné 37 poissons ce matin.","L'art c'est ma vie. Et le sable.","Ma prochaine œuvre: une sculpture de crabe.","La beauté est partout sauf dans mon agenda.","Inspiration: UN PALMIER. Génie.","Je vois des formes dans les nuages. Toutes intéressantes.","Mon imaginaire déborde. Littéralement.","Chaque journée est une toile blanche.","Créer c'est exister autrement.","J'ai inventé un nouveau style artistique ce matin.","La couleur du vent aujourd'hui: pervenche.","Toute surface est une potentielle œuvre d'art.","Mon cerveau génère 200 idées/heure.","L'improvisation est ma technique principale.","Je photographie les ombres. Passionnant.","Les idées arrivent à 3h du matin. Toujours.","Créer ou mourir. Je crée donc je vis.","La créativité ignore les règles. Comme moi.","Mon atelier mental ne ferme jamais.","Je collabore avec l'univers pour créer.","L'art sans passion n'est que décoration.","Inspiration: partout. Temps: jamais assez.","Je documente le quotidien comme une œuvre.","Même mes erreurs sont artistiques.","Le chaos est ma muse préférée.","Je vois la poésie dans les choses ordinaires.","Créativité: mon OS de base.","Une nouvelle idée toutes les 3 minutes. Normal.","Le chaos est ma muse préférée."],
  Gourmand:["J'ai faim. Encore.","Quelqu'un a vu des mangues?","La nourriture c'est la vraie culture.","*mange en marchant*","La meilleure médecine c'est un gâteau.","J'ai rêvé d'une pizza cette nuit. Encore.","Chaque repas est une expérience spirituelle.","Je connais tous les restaurants de l'île.","Mon estomac dirige mes décisions. Et il a raison.","Un biscuit ne suffit jamais.","Manger est mon talent principal.","La cuisine est de l'amour comestible.","J'ai une relation sérieuse avec la nourriture.","Le buffet m'appelle. J'y cours.","Mon bonheur se mesure en calories.","Régime? Connais pas ce mot.","Goûter avant décider. Ma philosophie de vie.","Mon appétit est proportionnel à mon enthousiasme.","La faim est la meilleure sauce.","Savourer chaque bouchée: ma méditation.","Mon guide de voyage: les restaurants.","Quelqu'un cuisine? Je détecte ça à 500m.","L'odeur de pain frais est ma drogue légale.","Je vis pour manger. Fièrement.","Partager la nourriture = partager l'amour.","Dessert d'abord. La vie est courte.","Mon palais est un instrument de précision.","La table est le vrai centre du monde.","Je grignote donc je suis.","Le sucré le matin, pourquoi pas?"],
  Sportif:["Allez, on bouge!","Repos c'est pour les faibles. Ou les sages.","Mon record personnel: 42 pompes en pyjama.","L'endorphine c'est ma drogue légale préférée.","Cardio? J'appelle ça danser avec la mort.","Le corps est un temple. J'entretiens le mien.","Pas de douleur, pas de gain. J'aime la douleur.","Chaque jour est un jour d'entraînement.","Mon corps est ma plus belle machine.","Transpirer c'est pleurer en mieux.","La salle de sport est ma maison.","Récupération active: bouger différemment.","Je bats mes propres records chaque semaine.","Performance et plaisir. Les deux.","Je ne m'arrête pas quand je suis fatigué(e). Je m'arrête quand c'est fini.","Les escaliers sont une opportunité sportive.","La victoire se prépare dans l'effort quotidien.","Sport le matin, humeur au top toute la journée.","Mon corps me dit stop. Je négocie.","L'inactivité c'est ma kryptonite.","Squats partout, tout le temps. Même ici.","La forme physique est un état d'esprit.","Je surpasse la version d'hier de moi-même.","Bouger c'est vivre. Rester immobile c'est... non.","Ma playlist sport: 3h de tubes.","Le repos est important. Mais moins que le sport.","Mon corps est mon projet préféré.","Hydraté, entraîné, motivé. C'est mon identité.","Une journée sans sport est une journée de perdue.","Mon cœur est fort parce que je l'entraîne à l'être."],
  Bavard:["Ah tu sais quoi? Non attends, j'ai mieux.","J'ai tellement de choses à dire, genre TELLEMENT.","Bref, pour revenir à ce que je disais il y a 20 minutes…","Le silence ça m'angoisse alors je parle.","J'adore les conversations. Surtout quand c'est moi qui parle.","Écouter c'est attendre son tour de parler.","Mon record: 6h de monologue. Inégalé.","J'ai des opinions sur tout. Et je les partage. Toutes.","La communication c'est ma vocation.","Anecdote: une fois j'ai… attendez cette histoire est longue.","Je commence les histoires sans savoir la fin. C'est du suspense.","Ma langue ne connaît pas le repos.","Je peux parler de n'importe quoi avec n'importe qui.","Monologue intérieur? Je le fais à voix haute.","Quelqu'un veut entendre mon avis? Non? Tant pis je le donne.","J'ai tellement de mots en stock.","Raconter est mon super-pouvoir.","Je comble tous les silences. C'est un service public.","Mon débit de parole: impressionnant même pour moi.","Une pensée = une phrase = une histoire.","Vous voulez des détails? J'en ai 847.","J'ai commencé à parler. Je m'arrêterai un jour.","Bavard? Je préfère 'communicateur intensif'.","Le silence est là pour être rempli de mots.","Mon flux de conscience est un fleuve très bruyant.","Les gens partent avant que j'aie fini. Je continue quand même.","Mon WhatsApp: 3000 messages envoyés. Par moi.","Je m'interromps moi-même pour dire quelque chose de plus important.","Trois heures de conversation c'est une introduction pour moi.","Je parle vite pour que tout rentre. Ça rentre pas toujours."],
  Sérieux:["Je ne plaisante pas.","Ce n'est pas le moment.","Analysons la situation calmement.","Il y a 3 options. Aucune n'est drôle.","L'humour est une réponse inappropriée.","Restons factuels.","Les données indiquent que…","La légèreté est une forme d'irresponsabilité.","Je prends tout au sérieux. C'est sérieux.","Le contexte est essentiel à l'analyse.","Sans rigueur, point de salut.","J'évalue avant d'agir.","Les faits avant les émotions.","Processus, méthode, résultat.","Je note tout. Pour la postérité.","Chaque décision mérite réflexion.","Mon expression naturelle: neutre et concentré(e).","L'enthousiasme doit être calibré.","Je n'ai pas de temps pour les futilités.","Mes priorités sont hiérarchisées.","L'efficacité avant l'agrément.","La discipline est la mère du succès.","Je respecte les règles. Toutes.","L'analyse est ma passion. Sérieusement.","Sérieux ≠ ennuyeux. Enfin… pas nécessairement.","Je planifie donc je suis.","Les émotions sont des variables à contrôler.","Je lis les contrats en entier. Toujours.","La précision est la courtoisie de la pensée.","Je n'improvise pas. J'adapte mon plan B."],
  Flirteur:["Tu as un sourire qui dévaste les îles.","Oh là là… bonjour.","Est-ce que tu viens souvent sur cette plage?","Je parie que tu es encore plus beau(belle) de près.","Mon cœur? Il t'appartient. Pour l'instant.","Tes yeux ont la couleur de l'horizon.","Je t'offrirais bien le soleil mais il est déjà là.","Tu es la meilleure vue de cette île.","Hasard ou destin qu'on se retrouve ici?","Je cherchais une raison de sourire. Te voilà.","Est-ce qu'on se connaît? Parce qu'on devrait.","Je collectionne les beaux souvenirs. Tu peux en être un.","Ma boussole pointe dans ta direction.","Le coucher de soleil est beau mais tu l'éclipses.","Un café? Une promenade? Une vie entière?","Je ne crois pas au coup de foudre. Jusqu'à maintenant.","Tu illumines même les jours nuageux.","Je suis tombé(e) sous ton charme. Comment me relever?","Ton regard est un horizon que j'aimerais explorer.","Le paradis c'est ici parce que tu y es.","Tu as un don pour rendre les gens heureux. Moi en tout cas.","Ton rire est ma chanson préférée du moment.","Mon type? Quelqu'un comme toi. Mais exactement toi en fait.","Flirter c'est mon cardio. Tu fais monter mon rythme.","Est-ce un hasard si on se retrouve toujours au même endroit?","Tu es l'exception à toutes mes règles.","Quelqu'un devrait te remercier d'exister. Permettez-moi.","Je pourrais te regarder sourire toute la journée.","Mon cœur bat plus vite depuis que tu es là. C'est médical.","Si tu étais une île tu serais la mienne."],
  Philosophe:["Qu'est-ce que le bonheur, vraiment?","Exister c'est résister. Ou pas.","Le temps n'est qu'une illusion de palmier.","Si un arbre tombe sur l'île et que personne…","Descartes aurait adoré cette île. Ou détesté.","Je pense donc je suis. Et toi?","La mer est une métaphore de l'inconscient collectif.","Le sens de la vie? En cours de calcul.","Sommes-nous libres ou déterminés à croire que oui?","L'être et le néant se rencontrent sur cette plage.","La vérité est-elle absolue ou relative à la marée?","Chaque vague soulève une question existentielle.","Qui suis-je en dehors de mes habitudes?","Vivre ou exister? Différence fondamentale.","Sisyphe était heureux. Cette île aussi peut l'être.","Le paradoxe du libre arbitre sur une île isolée…","Nietzsche dirait quoi de cette communauté?","Nous sommes tous des personnages dans l'histoire de l'univers.","La solitude est la condition fondamentale de l'être.","L'amour est-il chimie, choix ou convention sociale?","La liberté absolue génère l'angoisse. Je suis libre donc angoissé(e).","Être heureux: chemin ou destination? Débattons.","Le présent n'existe pas, seulement la mémoire et l'anticipation.","Le langage crée-t-il la réalité ou la décrit-il seulement?","Peut-on connaître l'autre vraiment? Je doute.","Heidegger parlait d'être-au-monde. Ici c'est être-à-l'île.","Qu'est-ce qu'une communauté? Réfléchissons ensemble.","La beauté est-elle dans l'œil de celui qui regarde?","Le temps guérit-il vraiment ou masque-t-il seulement?","L'identité est-elle fixe ou fluide comme la mer?"],
  Anxieux:["Et si ça se passe mal?","J'ai prévu 12 plans de secours.","Est-ce que j'ai bien fermé la porte?","Tout va bien. NON ça va pas. Si. Non.","*respire dans un sac en papier*","Le pire est probable. Statistiquement.","Mon niveau d'inquiétude: maximum.","J'ai vérifié 7 fois. Je revérifie.","Que se passerait-il si… non je préfère pas savoir.","Mon cerveau invente des catastrophes créatives.","J'ai un plan B, C et Z.","Ce silence me préoccupe.","Tout le monde a l'air trop décontracté. Suspect.","J'analyse les risques de cette conversation.","Mon anxiété a son propre agenda.","La tranquillité est souvent précurseur d'un problème.","Le calme avant la tempête. Je sens la tempête.","Est-ce que tout le monde va bien? Vraiment?","Mon estomac est l'instrument de mes angoisses.","Je prépare ma réponse à des questions pas encore posées.","Et si l'île était en fait… non. Non non non.","J'ai peur d'avoir peur. C'est une meta-angoisse.","Le bonheur me rend méfiant. Qu'est-ce qui va arriver?","Et si les palmiers n'étaient pas aussi stables qu'ils semblent?","Mon niveau de cortisol: record personnel.","Je planifie des sorties de secours pour chaque conversation.","L'imprévu est mon ennemi juré.","Je vis dans le futur catastrophique. C'est épuisant.","Mon cerveau a un département entier dédié aux 'et si'.","J'aimerais m'inquiéter moins. Je m'en inquiète."],
  Courageux:["Je n'ai peur de rien! (ou presque)","En avant! Quoi que ce soit.","Les obstacles sont des trampolines.","Veni, vidi, j'ai quand même un peu paniqué.","Le danger est relatif.","Face aux peurs: foncer dedans.","Ma devise: d'abord agir, paniquer ensuite.","Le courage c'est avoir peur et y aller quand même.","Les défis m'attirent comme les flammes les papillons.","Reculer? Pas dans mon vocabulaire. Enfin si, mais rarement.","Le risque calculé est ma spécialité.","Jamais deux sans trois aventures.","Mon adrénaline préférée: l'inconnu.","Bravoure et folie sont cousines. Je connais les deux.","Chaque peur affrontée agrandit ma liberté.","Les situations difficiles révèlent le meilleur.","Oser est ma philosophie pratique.","Je prends des initiatives. Même non sollicitées.","Affronter plutôt que fuir. Toujours.","Mon courage inspire les autres. Ou les inquiète.","Je saute dans l'inconnu avec un sourire.","Les gens disent que je suis téméraire. Ils ont raison.","L'audace est récompensée. J'en veux la preuve chaque jour.","Je choisis le chemin difficile. Il vaut mieux.","Courage = gestion créative de la peur.","Devant l'adversité: sourire et continuer.","Je suis le premier à m'élancer et le dernier à me plaindre.","Chaque défi est une invitation à grandir. J'accepte.","La peur de rater est moins grande que la peur de ne pas essayer.","J'ai sauté. Je verrai en tombant si c'était une bonne idée."],

const RA=a=>a[Math.floor(Math.random()*a.length)];
const RN=(lo,hi)=>Math.floor(Math.random()*(hi-lo+1))+lo;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const he=s=>HE[s]||'';
const me=m=>ME[m]||'🙂';
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function two(g){const s=[...g.residents].sort(()=>Math.random()-.5);return[s[0],s[1]||s[0]];}
function three(g){const s=[...g.residents].sort(()=>Math.random()-.5);return[s[0],s[1]||s[0],s[2]||null];}
function grel(g,a,b){let r=g.relations.find(r=>(r.a===a.id&&r.b===b.id)||(r.b===a.id&&r.a===b.id));if(!r){r={id:uid(),a:a.id,b:b.id,type:'neutral',score:50};g.relations.push(r);}return r;}

async function aiDlg(r,partner=null,adult=false){
  if(r.indoor)return;
  showDialog(r,'💭…',false,3000);
  const rel=partner&&partner.id!==r.id?grel(G,r,partner):null;
  const relDesc=rel?({friend:'ami(e)',love:'amoureux/se',rival:'rival(e)',neutral:'connaissance'}[rel.type]||'connaissance'):'';
  const others=G.residents.filter(x=>x.id!==r.id&&(!partner||x.id!==partner.id));
  const third=others.length?RA(others).name:null;
  const traitsStr=r.traits.join(' et ');
  const otherCtx=partner&&partner.id!==r.id?`Il/elle est avec ${partner.name} (${partner.traits.join(', ')}), dont il/elle est ${relDesc}.`:'Il/elle se promène seul(e).';
  const adultCtx=adult&&G.adultMode?`\nTu peux être suggestif(ve), faire allusion à des situations -18.${third?` Tu peux mentionner ${third} dans un plan à 3.`:''}`:'';
  const prompt=`Tu joues un personnage dans "Île Bonheur", un jeu social humoristique.\nPersonnage: ${r.name}, personnalités: ${traitsStr}, humeur: ${r.mood}.\n${otherCtx}${adultCtx}\nGénère UNE seule réplique (8-15 mots max), drôle${adult&&G.adultMode?' ou suggestive':' ou absurde'}, cohérente avec ses personnalités.\nJuste la phrase, sans guillemets.`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:90,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    const txt=(data.content?.[0]?.text||'').trim()||getFb(r,adult);
    showDialog(r,txt,adult&&G.adultMode);
  }catch{showDialog(r,getFb(r,adult),adult&&G.adultMode);}
}

function getFb(r,adult=false){
  if(adult&&G.adultMode&&Math.random()<.4&&G.residents.length>=2){
    const others=G.residents.filter(x=>x.id!==r.id);
    const b=RA(others).name;
    const third=others.length>1?RA(others.filter(x=>x.name!==b)).name:null;
    const fn=RA(ADLG.slice(0,7));
    try{return typeof fn==='function'?fn(r.name,b,third):'😏...';}catch{return'😏...';}
  }
  const pool=TDLG[r.traits[0]]||TDLG['Drôle'];
  return RA(pool);
}

  const pool=G.adultMode&&Math.random()<.28&&G.residents.length>=2?AEVTS:REVTS;

function doFestival(){

  addEvent('🎉 Fête tropicale générale ! Confettis et flamants partout !');notify('🎉','Fête générale !');refreshStats();renderAllAvatars();

function doPeace(){
  const rivals=G.relations.filter(r=>r.type==='rival');
  if(!rivals.length){notify('😄','Aucun conflit !');return;}
  const rel=RA(rivals);rel.type='friend';rel.score=clamp(rel.score+32,0,100);
  const a=G.residents.find(x=>x.id===rel.a),b=G.residents.find(x=>x.id===rel.b);
  if(a&&b){a.mood='😊';b.mood='😊';addEvent(`🕊️ ${a.name} et ${b.name} font la paix !`);notify('🕊️',`Paix : ${a.name} & ${b.name}`);}
  refreshStats();renderRelPanel();renderAllAvatars();
}
function doLove(){
  if(G.residents.length<2){notify('😅','Besoin de 2 habitants !');return;}
  const[a,b]=two(G);if(a.id===b.id)return;

function boostRes(id){

function sendResTo(resId,bldId,doNotify=true){
  const r=G.residents.find(x=>x.id===resId);if(!r)return;
  if(r.indoor&&G.occupants[r.indoor])G.occupants[r.indoor]=G.occupants[r.indoor].filter(x=>x!==resId);
  r.indoor=bldId;
  if(bldId){
    if(!G.occupants[bldId])G.occupants[bldId]=[];
    if(!G.occupants[bldId].includes(resId))G.occupants[bldId].push(resId);
    document.getElementById('av-'+resId)?.remove();
    const bld=BLDS.find(b=>b.id===bldId);
    if(doNotify)addEvent(`${bld.icon} ${r.name} entre dans ${bld.name}.`);
  }else{
    r.x=RN(10,80);r.y=RN(0,4);
    createAvEl(r);
    if(doNotify)addEvent(`🏝️ ${r.name} retourne se promener.`);
  }
  refreshBldOccs();renderResPanel();
}

function handleShopImg(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    newItemImgData=ev.target.result;
    const prev=document.getElementById('img-prev');
    if(prev)prev.innerHTML=`<img src="${newItemImgData}">`;
  };reader.readAsDataURL(file);
}
function renderShopItems(){
  if(!G.shopItems||!G.shopItems.length)return'<div style="color:rgba(255,255,255,.3);text-align:center;padding:1rem;font-size:.75rem;grid-column:1/-1">Boutique vide ! Créez des articles ci-dessous.</div>';
  return G.shopItems.map(it=>`
    <div class="shop-item" onclick="buyItem('${it.id}')">
      <button class="shop-item-del" onclick="event.stopPropagation();deleteShopItem('${it.id}')">✕</button>
      <div class="shop-item-img">${it.imgData?`<img src="${it.imgData}">`:(it.emoji||'📦')}</div>
      <div class="shop-item-name">${it.name}</div>
      <div class="shop-item-price">🌟 ${it.price}</div>
      <div class="shop-item-desc">${it.desc||''}</div>
    </div>`).join('');
}
function addShopItem(){
  const name=document.getElementById('ni-name')?.value?.trim();
  const emoji=document.getElementById('ni-emoji')?.value?.trim()||'📦';
  const price=parseInt(document.getElementById('ni-price')?.value)||10;
  const desc=document.getElementById('ni-desc')?.value?.trim()||'';
  if(!name){notify('😅','Donnez un nom à l\'article !');return;}
  const item={id:uid(),name,emoji,price,desc,imgData:newItemImgData||null};
  G.shopItems.push(item);newItemImgData=null;
  const grid=document.getElementById('shop-grid');
  if(grid)grid.innerHTML=renderShopItems();
  notify('✅',`Article ajouté : ${name} ${emoji}`);saveGame();
}
function deleteShopItem(id){
  G.shopItems=G.shopItems.filter(x=>x.id!==id);
  const grid=document.getElementById('shop-grid');
  if(grid)grid.innerHTML=renderShopItems();
  notify('🗑️','Article supprimé');saveGame();
}
function buyItem(itemId){
  const item=G.shopItems.find(x=>x.id===itemId);if(!item)return;
  if(!G.residents.length){notify('😅','Aucun habitant !');return;}
  const canAfford=G.residents.filter(r=>(r.coins||0)>=item.price);
  const r=canAfford.length?RA(canAfford):RA(G.residents);
  if((r.coins||0)<item.price){notify('😅',`${r.name} n'a pas assez de pièces ! (${r.coins||0}/🌟${item.price})`);return;}
  r.coins=(r.coins||0)-item.price;r.happiness=clamp(r.happiness+15,0,100);
  if(!r.inventory)r.inventory=[];
  const existing=r.inventory.find(x=>x.id===itemId);
  if(existing)existing.qty=(existing.qty||1)+1;
  else r.inventory.push({...item,qty:1});
  spawnFX(r,item.imgData?'🎁':(item.emoji||'🎁'));
  addEvent(`🛒 ${r.name} achète "${item.name}" ${item.emoji||''} pour 🌟${item.price} !`);
  notify(item.imgData?'🎁':(item.emoji||'🛒'),`${r.name} achète ${item.name} !`);
  refreshStats();renderResPanel();
}

// ── Quiz ──
const QUIZ=[
  {q:"Quel fruit est le plus controversé sur une pizza ?",a:["Ananas","Fraise","Mangue","Pêche"],c:0},
  {q:"Combien de flamants pour une île heureuse ?",a:["Aucun","42","7","Au moins 3"],c:3},
  {q:"Meilleure heure pour une sieste tropicale ?",a:["6h du mat","Toujours","Jamais","14h précis"],c:1},
  {q:"Que fait-on sur l'île quand il pleut ?",a:["On panique","On danse","On pleure","On mange des crêpes"],c:3},
  {q:"Super-pouvoir secret des cocotiers ?",a:["Voler","Parler","Écouter les secrets","Faire du café"],c:2},
  {q:"Qu'est-ce qui rend une île parfaite ?",a:["Des plages","Des habitants heureux","Du Wi-Fi","Tout ça"],c:3},
  {q:"Combien de fois peut-on tomber amoureux ?",a:["Une fois","Trois fois","Infiniment","Zéro, c'est compliqué"],c:2},
  {q:"La meilleure saison sur l'île ?",a:["Printemps","Été","Automne","Il fait toujours beau"],c:3},
];
let quizSt={q:0,score:0};
function openQuiz(){quizSt={q:0,score:0};renderQuiz();}
function renderQuiz(){
  if(quizSt.q>=QUIZ.length){
    const s=quizSt.score;
    openModal(`<button class="mclose" onclick="closeModal()">✕</button><div class="mtitle">🧠 Résultat Quiz</div><div style="text-align:center;font-size:3rem;margin:.5rem 0">${s>=7?'🏆':s>=5?'⭐':s>=3?'🌟':'🥚'}</div><div style="text-align:center;color:white;font-weight:800;font-size:1.3rem">${s}/${QUIZ.length}</div><div style="text-align:center;color:rgba(255,255,255,.45);font-size:.83rem;margin:.4rem 0">${s>=7?'Génie insulaire !':s>=5?'Pas mal du tout !':'L\'île se demande si tu l\'aimes vraiment.'}</div><button class="btn-pri" onclick="openQuiz()">🔄 Rejouer !</button>`);
    G.residents.forEach(r=>r.happiness=clamp(r.happiness+s*2,0,100));refreshStats();return;
  }
  const q=QUIZ[quizSt.q];
  openModal(`<button class="mclose" onclick="closeModal()">✕</button><div class="mtitle">🧠 Quiz Île</div><div style="color:rgba(255,255,255,.38);font-size:.7rem;text-align:center;margin-bottom:.65rem">Q${quizSt.q+1}/${QUIZ.length} · Score : ${quizSt.score}</div><div style="color:white;font-weight:700;font-size:.9rem;text-align:center;margin-bottom:.9rem;line-height:1.5">${q.q}</div>${q.a.map((ans,i)=>`<button class="bld-menu-btn" style="width:100%;margin-bottom:.35rem;text-align:left;padding:.55rem .85rem" onclick="ansQuiz(${i})">${ans}</button>`).join('')}`);
}
function ansQuiz(i){
  const q=QUIZ[quizSt.q];
  if(i===q.c){quizSt.score++;notify('✅','Bonne réponse !');}
  else notify('❌',`Raté ! C'était : ${q.a[q.c]}`);
  quizSt.q++;renderQuiz();
}

let CS={};
function openCreator(){
  CS={name:'',traits:[RA(ALL_TRAITS)],skin:SKIN[0],hair:HAIR_C[0],shirt:SHIRT_C[0],pants:PANT_C[0],shoes:SHOE_C[0],hairStyle:'Courte',faceShape:'Ronde'};
  renderCreator();
}
function editRes(id){
  const r=G.residents.find(x=>x.id===id);if(!r)return;
  CS={...r,traits:[...r.traits],_eid:id};renderCreator();
}
function toggleTrait(t){
  const i=CS.traits.indexOf(t);
  if(i>=0){if(CS.traits.length>1)CS.traits.splice(i,1);}
  else{if(CS.traits.length<5)CS.traits.push(t);else notify('😅','Max 5 personnalités !');}
  renderCreator();
}
function renderCreator(){
  const c=CS;
  openModal(`
    <button class="mclose" onclick="closeModal()">✕</button>
    <div class="mtitle">${c._eid?'✏️ Modifier':'✨ Créer un personnage'}</div>
    <div class="prev-av" style="background:${c.skin};width:75px;height:75px">
      <div class="prev-hair">${he(c.hairStyle)}</div>
      <div style="font-size:10px;color:rgba(0,0,0,.38)">${me('😊')}</div>
    </div>
    <div style="text-align:center;color:rgba(255,255,255,.32);font-size:.68rem;margin-bottom:.85rem">${c.traits.join(' · ')} · ${c.hairStyle} · ${c.faceShape}</div>

    <div class="msec">
      <div class="mlabel">Prénom</div>
      <input class="minput" id="c-name" placeholder="Ex : Zara, Luca, Mia…" value="${c.name}" maxlength="14" oninput="CS.name=this.value">
    </div>

    <div class="msec">
      <div class="mlabel">Personnalités (max 5 — cliquez pour ajouter/retirer)</div>
      <div class="mopts">${ALL_TRAITS.map(t=>`<div class="mopt${c.traits.includes(t)?' sel':''}" onclick="toggleTrait('${t}')">${t}</div>`).join('')}</div>
    </div>

    <div class="msec">
      <div class="mlabel">Visage</div>
      <div class="mopts">${FACE_S.map(s=>`<div class="mopt${c.faceShape===s?' sel':''}" onclick="CS.faceShape='${s}';renderCreator()">${s}</div>`).join('')}</div>
    </div>

    <div class="msec">
      <div class="mlabel">Coiffure</div>
      <div class="mopts">${HAIR_S.map(s=>`<div class="mopt${c.hairStyle===s?' sel':''}" onclick="CS.hairStyle='${s}';renderCreator()">${he(s)||'🚫'} ${s}</div>`).join('')}</div>
    </div>

    <div class="msec">
      <div class="mlabel">Couleur de peau</div>
      <div class="mopts">${SKIN.map(col=>`<div class="mcol${c.skin===col?' sel':''}" style="background:${col}" onclick="CS.skin='${col}';renderCreator()"></div>`).join('')}</div>
    </div>

    <div class="msec">
      <div class="mlabel">Couleur des cheveux</div>
      <div class="mopts">${HAIR_C.map(col=>`<div class="mcol${c.hair===col?' sel':''}" style="background:${col};${col==='#ffffff'?'border:1px solid rgba(255,255,255,.3)':''}" onclick="CS.hair='${col}';renderCreator()"></div>`).join('')}</div>
    </div>

    <div class="msec">
      <div class="mlabel">Couleur du haut</div>
      <div class="mopts">${SHIRT_C.map(col=>`<div class="mcol${c.shirt===col?' sel':''}" style="background:${col}" onclick="CS.shirt='${col}';renderCreator()"></div>`).join('')}</div>
    </div>

    <div class="msec">
      <div class="mlabel">Couleur du pantalon</div>

    </div>

      <div class="mlabel">Couleur des chaussures</div>
      <div class="mopts">${SHOE_C.map(col=>`<div class="mcol${c.shoes===col?' sel':''}" style="background:${col};${col==='#FFFFFF'?'border:1px solid rgba(255,255,255,.3)':''}" onclick="CS.shoes='${col}';renderCreator()"></div>`).join('')}</div>
    </div>

function confirmCreate(){
  const nameInput=document.getElementById('c-name');
  const name=(nameInput?.value?.trim())||RA(NAMES);
  if(CS._eid){
    const r=G.residents.find(x=>x.id===CS._eid);
    if(r){const eid=r.id;Object.assign(r,{...CS,name,id:eid});delete r._eid;}
    closeModal();renderAllAvatars();refreshStats();renderResPanel();notify('✅','Personnage modifié !');return;
  }
  const r=makeRes(name,{...CS,name});
  G.residents.push(r);
  G.residents.slice(0,-1).forEach(ex=>G.relations.push({id:uid(),a:r.id,b:ex.id,type:'neutral',score:50}));
  closeModal();createAvEl(r);refreshStats();
  addEvent(`🆕 ${r.name} (${r.traits.join(', ')}) débarque sur ${G.islandName} !`);notify('🆕',`Bienvenue ${r.name} !`);
  setTimeout(()=>aiDlg(r),1000);
}

// MINI GAME
// ══════════════════════════════════════════════════════
const BC=['#FF6B6B','#FFD93D','#6BCB77','#74B9FF'];
const BE=['🔴','🟡','🟢','🔵'];
let MG={score:0,combo:0,active:-1,iv:null,tLeft:30,total:30};
function openMG(){
  MG={score:0,combo:0,active:-1,iv:null,tLeft:30,total:30};
  const tr=document.getElementById('beat-track');
  tr.innerHTML=BC.map((col,i)=>`<div class="bzone" id="bz${i}" style="border-color:${col}40;color:${col}" onclick="hitBeat(${i})">${BE[i]}</div>`).join('');
  document.getElementById('mg-score').textContent='0';
  document.getElementById('mg-combo').textContent='';
  document.getElementById('mg-msg').textContent='Prêt…';
  document.getElementById('mg-tf').style.width='100%';
  document.getElementById('mg-overlay').className='on';
  setTimeout(startRhythm,800);
}
function startRhythm(){
  let bi=0;
  MG.iv=setInterval(()=>{
    MG.tLeft-=.15;
    document.getElementById('mg-tf').style.width=Math.max(0,MG.tLeft/MG.total*100)+'%';
    if(MG.tLeft<=0){endRhythm();return;}
    bi++;
    if(bi%5===0){
      if(MG.active>=0){const oz=document.getElementById('bz'+MG.active);if(oz){oz.style.background='transparent';oz.style.borderColor=BC[MG.active]+'40';oz.style.transform='scale(1)';}}
      MG.active=Math.floor(Math.random()*4);
      const nz=document.getElementById('bz'+MG.active);
      if(nz){nz.style.background=BC[MG.active]+'35';nz.style.borderColor=BC[MG.active];nz.style.transform='scale(1.15)';}
    }
  },80);
}
function hitBeat(i){
  if(MG.active===i){
    MG.score+=10*(1+Math.floor(MG.combo/5));MG.combo++;
    document.getElementById('mg-score').textContent=MG.score;
    document.getElementById('mg-combo').textContent='Combo x'+MG.combo+' 🔥';
    document.getElementById('mg-msg').textContent=RA(['Parfait !','Excellent !','🔥 En feu !','💥 BOOM !','Incroyable !']);
    const z=document.getElementById('bz'+i);
    if(z){z.style.filter='brightness(1.7)';setTimeout(()=>{if(z)z.style.filter='';},200);}
  }else{
    MG.combo=0;document.getElementById('mg-combo').textContent='';document.getElementById('mg-msg').textContent='Raté ! 😅';
  }
}
function endRhythm(){
  clearInterval(MG.iv);
  document.getElementById('beat-track').innerHTML=`<div style="font-family:'Fredoka One';color:#FFD93D;font-size:1.7rem;text-align:center">🏆 ${MG.score} pts !</div>`;
  document.getElementById('mg-msg').textContent='Bravo !';
  addEvent(`🎮 Score ${MG.score} au Rhythm Island !`);
  G.residents.forEach(r=>r.happiness=clamp(r.happiness+3,0,100));refreshStats();
}
function closeMG(){clearInterval(MG.iv);document.getElementById('mg-overlay').className='';}

// ══════════════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════════════
function tickClock(){
  G.time.min+=4;
  if(G.time.min>=60){G.time.min=0;G.time.hour++;}
  if(G.time.hour>=24){G.time.hour=0;G.time.day++;}
  const t=G.time;
  document.getElementById('clock-txt').textContent=`${DAYS[(t.day-1)%7]} ${String(t.hour).padStart(2,'0')}:${String(t.min).padStart(2,'0')}`;
  renderSky();
  // Night window lights
  const isNight=t.hour>=20||t.hour<7;
  if(Math.random()<.03)document.querySelectorAll('.bld-win').forEach(w=>{if(Math.random()<.3)w.className='bld-win'+(isNight&&Math.random()<.7?' on':'');});
}

function tickResidents(){
  G.tick++;
  const isSleep=G.time.hour>=23||G.time.hour<6;
  G.residents.forEach(r=>{
    if(!r.indoor){
      if(r.movePause>0)r.movePause--;
      else{
        r.x+=r.dirX*(isSleep?r.speed*.12:r.speed);
        if(r.x<2||r.x>88){r.dirX*=-1;r.movePause=RN(20,58);}
      }
    }
    if(G.tick%32===0){
      if(isSleep)r.energy=clamp(r.energy+2,0,100);
      else r.energy=clamp(r.energy-1,0,100);
      if(r.energy<20)r.happiness=clamp(r.happiness-2,0,100);
      r.social=clamp(r.social+(Math.random()>.5?2:-1),0,100);
      if(Math.random()<.12)r.mood=RA(r.happiness>60?GOOD_MOODS:ALL_MOODS);
      if(!r.coins)r.coins=0;
      if(Math.random()<.3)r.coins=clamp(r.coins+RN(1,3),0,9999);
    }
    if(!r.indoor)updateAvEl(r);
  });
  // Indoor residents
  if(G.tick%32===0){
    G.residents.filter(r=>r.indoor).forEach(r=>{
      r.energy=clamp(r.energy+1,0,100);
      r.social=clamp(r.social+2,0,100);
      if(Math.random()<.08)r.mood=RA(GOOD_MOODS);
      if(!r.coins)r.coins=0;
      if(Math.random()<.2)r.coins=clamp(r.coins+RN(1,2),0,9999);
    });
  }
}

let autoDialT=0,autoEvtT=0;
function gameLoop(){
  tickClock();tickResidents();G.tick++;
  autoDialT++;
  if(autoDialT>=65&&G.residents.length){
    autoDialT=0;
    const outdoor=G.residents.filter(r=>!r.indoor);
    if(outdoor.length){
      const r=RA(outdoor);
      const partner=outdoor.length>1?RA(outdoor.filter(x=>x.id!==r.id)):null;
      const isAdult=G.adultMode&&Math.random()<.22;
      if(Math.random()<.55)aiDlg(r,partner,isAdult);
      else showDialog(r,getFb(r,isAdult),isAdult&&G.adultMode);
    }
  }
  autoEvtT++;
  if(autoEvtT>=420&&G.residents.length>=2){autoEvtT=0;if(Math.random()<.55)fireEvent();}
  if(G.tick%380===0&&G.relations.length){
    const rel=RA(G.relations);rel.score=clamp(rel.score+RN(-7,10),0,100);
    if(rel.score>=85&&rel.type==='neutral')rel.type='friend';
    if(rel.score<=12&&rel.type==='neutral')rel.type='rival';
    if(rel.score>=96&&rel.type==='friend')rel.type='love';
    if(rel.score>=58&&rel.type==='rival')rel.type='neutral';
    renderRelPanel();
  }
}

// KEYBOARD — FIX: skip shortcuts when typing in an input
// ══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  // NEVER fire shortcuts if the user is typing in an input/textarea
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA'||document.activeElement?.isContentEditable)return;

  if(e.key==='Escape')closeModal();
  if(e.key==='f'||e.key==='F')doFestival();
  if(e.key==='e'||e.key==='E')fireEvent();
  if(e.key==='n'||e.key==='N')openCreator();
  if(e.key==='s'||e.key==='S')openShop();
});
